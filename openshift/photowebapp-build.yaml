apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: photowebapp-backend
spec:
  lookupPolicy:
    local: true
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: photowebapp-frontend
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: photowebapp-backend-build
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/NagypalMarton/PhotoWebApp_FLASK.git
      ref: main
    contextDir: backend
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: python:3.9
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: photowebapp-backend:latest
  triggers:
    - type: GitHub
      github:
        secret: your-github-webhook-secret
    - type: Generic
      generic:
        secret: your-generic-webhook-secret
    - type: ImageChange
    - type: ConfigChange
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: photowebapp-frontend-build
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/NagypalMarton/PhotoWebApp_FLASK.git
      ref: main
    contextDir: frontend
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: python:3.9
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: photowebapp-frontend:latest
  triggers:
    - type: GitHub
      github:
        secret: your-github-webhook-secret
    - type: Generic
      generic:
        secret: your-generic-webhook-secret
    - type: ImageChange
    - type: ConfigChange

