apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: photowebapp-backend-build
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/YOUR-USERNAME/YOUR-REPO.git
      ref: main
    contextDir: backend
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: python:3.9
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: photowebapp-backend:latest
  triggers:
    - type: GitHub
      github:
        secret: your-github-webhook-secret
    - type: Generic
      generic:
        secret: your-generic-webhook-secret
    - type: ImageChange
    - type: ConfigChange
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: photowebapp-frontend-build
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/YOUR-USERNAME/YOUR-REPO.git
      ref: main
    contextDir: frontend
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: python:3.9
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: photowebapp-frontend:latest
  triggers:
    - type: GitHub
      github:
        secret: your-github-webhook-secret
    - type: Generic
      generic:
        secret: your-generic-webhook-secret
    - type: ImageChange
    - type: ConfigChange
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: photowebapp-mysql-build
spec:
  runPolicy: Serial
  source:
    type: None
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: mysql:8.0
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: photowebapp-mysql:latest
  triggers:
    - type: ConfigChange
